  <text x="120" y="58" font-size="13" fill="#222" text-anchor="middle">ParkSmart Logo</text>

  <rect x="35" y="85" width="170" height="50" rx="6" fill="#ffffff" stroke="#333" stroke-width="1"/>
  <text x="120" y="115" font-size="12" fill="#222" text-anchor="middle">e2e_playwright</text>

  <rect x="35" y="150" width="170" height="32" rx="4" fill="none" stroke="#333" stroke-width="1"/>
  <text x="50" y="171" font-size="12" fill="#222">Dashboard</text>
  <rect x="35" y="186" width="170" height="32" rx="4" fill="none" stroke="#333" stroke-width="1"/>
  <text x="50" y="207" font-size="12" fill="#222">Dat cho</text>
  <rect x="35" y="222" width="170" height="32" rx="4" fill="none" stroke="#333" stroke-width="1"/>
  <text x="50" y="243" font-size="12" fill="#222">Lich su</text>
  <rect x="35" y="258" width="170" height="32" rx="4" fill="none" stroke="#333" stroke-width="1"/>
  <text x="50" y="279" font-size="12" fill="#222">Ban do</text>
  <rect x="35" y="294" width="170" height="32" rx="4" fill="none" stroke="#333" stroke-width="1"/>
  <text x="50" y="315" font-size="12" fill="#222">Camera</text>
  <rect x="35" y="330" width="170" height="32" rx="4" fill="none" stroke="#333" stroke-width="1"/>
  <text x="50" y="351" font-size="12" fill="#222">Nhan dien tien</text>
  <rect x="35" y="366" width="170" height="32" rx="4" fill="#e0e0e0" stroke="#333" stroke-width="1"/>
  <text x="50" y="387" font-size="12" fill="#222">Ho tro</text>
  <rect x="35" y="402" width="170" height="32" rx="4" fill="none" stroke="#333" stroke-width="1"/>
  <text x="50" y="423" font-size="12" fill="#222">Cai dat</text>
  <text x="35" y="455" font-size="11" fill="#666" font-style="italic">Sidebar nav</text>

  <!-- Page Header -->
  <text x="250" y="50" font-size="18" fill="#222" font-weight="bold">Ho tro khach hang</text>
  <text x="250" y="72" font-size="13" fill="#666">Chat voi AI hoac lien he truc tiep qua cac kenh ho tro</text>

  <!-- Contact strip -->
  <rect x="250" y="90" width="650" height="50" rx="6" fill="#f5f5f5" stroke="#333" stroke-width="1"/>
  <text x="265" y="120" font-size="13" fill="#222" font-weight="bold">Can lien he truc tiep?</text>
  <text x="430" y="120" font-size="11" fill="#666">Nhan vao Lien he o goc phai de chat qua Zalo, FB, Telegram</text>

  <!-- Chat Window -->
  <rect x="250" y="155" width="650" height="510" rx="6" fill="#ffffff" stroke="#333" stroke-width="1.5"/>

  <!-- Chat header -->
  <rect x="250" y="155" width="650" height="50" rx="6" fill="#f5f5f5" stroke="#333" stroke-width="1"/>
  <rect x="265" y="167" width="26" height="26" rx="13" fill="#e0e0e0" stroke="#333" stroke-width="1"/>
  <text x="305" y="180" font-size="13" fill="#222" font-weight="bold">ParkSmart AI Assistant</text>
  <text x="305" y="195" font-size="11" fill="#666">Dang hoat dong</text>
  <rect x="810" y="170" width="80" height="22" rx="11" fill="#e0e0e0" stroke="#333" stroke-width="1"/>
  <text x="850" y="185" font-size="10" fill="#222" text-anchor="middle">AI v3.0</text>

  <!-- Bot message -->
  <rect x="270" y="220" width="500" height="200" rx="6" fill="#f5f5f5" stroke="#333" stroke-width="1"/>
  <text x="285" y="245" font-size="12" fill="#222" font-weight="bold">Xin chao! Toi la AI cua ParkSmart.</text>
  <text x="285" y="265" font-size="11" fill="#222">Toi co the giup ban:</text>
  <text x="295" y="285" font-size="11" fill="#222">- Dat cho xe</text>
  <text x="295" y="303" font-size="11" fill="#222">- Xem cho trong</text>
  <text x="295" y="321" font-size="11" fill="#222">- Quan ly booking</text>
  <text x="295" y="339" font-size="11" fill="#222">- Ho tro khac</text>
  <text x="285" y="365" font-size="11" fill="#222">Ban can toi giup gi hom nay?</text>
  <text x="285" y="405" font-size="10" fill="#666">10:36</text>

  <!-- Quick reply chips -->
  <rect x="270" y="430" width="120" height="28" rx="14" fill="#ffffff" stroke="#333" stroke-width="1"/>
  <text x="330" y="448" font-size="11" fill="#222" text-anchor="middle">Xem cho trong</text>
  <rect x="395" y="430" width="120" height="28" rx="14" fill="#ffffff" stroke="#333" stroke-width="1"/>
  <text x="455" y="448" font-size="11" fill="#222" text-anchor="middle">Dat cho o to</text>
  <rect x="520" y="430" width="80" height="28" rx="14" fill="#ffffff" stroke="#333" stroke-width="1"/>
  <text x="560" y="448" font-size="11" fill="#222" text-anchor="middle">Bao gia</text>

  <text x="900" y="475" font-size="11" fill="#666" font-style="italic" text-anchor="end">Chat message list (scrollable)</text>

  <!-- Suggested chips row 2 -->
  <rect x="270" y="555" width="120" height="28" rx="14" fill="#ffffff" stroke="#333" stroke-width="1"/>
  <text x="330" y="573" font-size="11" fill="#222" text-anchor="middle">Cho do o ngay</text>
  <rect x="395" y="555" width="100" height="28" rx="14" fill="#ffffff" stroke="#333" stroke-width="1"/>
  <text x="445" y="573" font-size="11" fill="#222" text-anchor="middle">Xem lich su</text>
  <rect x="500" y="555" width="100" height="28" rx="14" fill="#ffffff" stroke="#333" stroke-width="1"/>
  <text x="550" y="573" font-size="11" fill="#222" text-anchor="middle">Tim cho trong</text>

  <!-- Input bar -->
  <rect x="270" y="600" width="610" height="50" rx="6" fill="#f5f5f5" stroke="#333" stroke-width="1.5"/>
  <rect x="285" y="612" width="30" height="26" rx="4" fill="#e0e0e0" stroke="#333" stroke-width="1"/>
  <text x="300" y="630" font-size="11" fill="#666" text-anchor="middle">+</text>
  <rect x="325" y="612" width="490" height="26" rx="4" fill="#ffffff" stroke="#333" stroke-width="1"/>
  <text x="335" y="630" font-size="11" fill="#666">Nhap tin nhan...</text>
  <rect x="825" y="612" width="50" height="26" rx="4" fill="#e0e0e0" stroke="#333" stroke-width="1"/>
  <text x="850" y="630" font-size="11" fill="#222" text-anchor="middle">Gui</text>

  <text x="900" y="680" font-size="11" fill="#666" font-style="italic" text-anchor="end">Input bar</text>

  <!-- Right Panel: AI info -->
  <rect x="910" y="155" width="270" height="170" rx="6" fill="#ffffff" stroke="#333" stroke-width="1.5"/>
  <rect x="930" y="170" width="40" height="40" rx="4" fill="#e0e0e0" stroke="#333" stroke-width="1"/>
  <text x="980" y="185" font-size="13" fill="#222" font-weight="bold">AI Assistant v3.0</text>
  <text x="980" y="203" font-size="11" fill="#666">Ho tro 24/7</text>
  <text x="930" y="240" font-size="11" fill="#222">Chatbot AI co the giup ban</text>
  <text x="930" y="258" font-size="11" fill="#222">dat cho, xem lich, theo doi</text>
  <text x="930" y="276" font-size="11" fill="#222">trang thai - bang ngon ngu tu</text>
  <text x="930" y="294" font-size="11" fill="#222">nhien.</text>
  <text x="1180" y="320" font-size="11" fill="#666" font-style="italic" text-anchor="end">AI capability card</text>

  <!-- Email support -->
  <rect x="910" y="340" width="270" height="100" rx="6" fill="#ffffff" stroke="#333" stroke-width="1.5"/>
  <text x="930" y="365" font-size="13" fill="#222" font-weight="bold">Email ho tro</text>
  <text x="930" y="385" font-size="11" fill="#666">Gui email cho doi ngu ho tro</text>
  <text x="930" y="415" font-size="12" fill="#222">support@parksmart.vn</text>
  <text x="1180" y="435" font-size="11" fill="#666" font-style="italic" text-anchor="end">Email card</text>

  <!-- Hours -->
  <rect x="910" y="455" width="270" height="210" rx="6" fill="#ffffff" stroke="#333" stroke-width="1.5"/>
  <text x="930" y="480" font-size="13" fill="#222" font-weight="bold">Gio lam viec</text>
  <line x1="930" y1="495" x2="1160" y2="495" stroke="#ccc" stroke-width="1"/>
  <text x="930" y="520" font-size="11" fill="#666">Thu 2 - Thu 6</text>
  <text x="1160" y="520" font-size="11" fill="#222" text-anchor="end">7:00 - 22:00</text>
  <text x="930" y="545" font-size="11" fill="#666">Thu 7 - CN</text>
  <text x="1160" y="545" font-size="11" fill="#222" text-anchor="end">8:00 - 20:00</text>
  <text x="930" y="570" font-size="11" fill="#666">Hotline</text>
  <text x="1160" y="570" font-size="11" fill="#222" text-anchor="end">24/7</text>
  <line x1="930" y1="595" x2="1160" y2="595" stroke="#ccc" stroke-width="1"/>
  <rect x="930" y="610" width="230" height="36" rx="4" fill="#e0e0e0" stroke="#333" stroke-width="1"/>
  <text x="1045" y="633" font-size="12" fill="#222" text-anchor="middle">AI hoat dong 24/7</text>

  <text x="1180" y="685" font-size="11" fill="#666" font-style="italic" text-anchor="end">Working hours card</text>
