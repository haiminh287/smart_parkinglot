<?xml version="1.0" encoding="UTF-8"?>
<!-- Wireframe mockup: Support / Chatbot | Design phase artifact for thesis report -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800" font-family="Inter, sans-serif">
  <rect x="0" y="0" width="1200" height="800" fill="#ffffff"/>

  <!-- Sidebar -->
  <rect x="20" y="20" width="200" height="760" rx="6" fill="#f5f5f5" stroke="#333" stroke-width="1.5"/>
