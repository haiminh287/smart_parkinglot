# Docker Compose override – Production local
# Dùng: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Override này:
#   1. Thêm nginx service → serve FE dist/ tại port 80
#   2. Set CORS_ALLOWED_ORIGINS + ALLOWED_HOSTS cho tất cả microservices
#   3. Tắt debug mode

services:

  # ─── Nginx – serve FE static + reverse proxy ────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: parksmart_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      # Config file (đường dẫn tương đối từ backend-microservices/)
      - ../infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # FE build output
      - ../spotlove-ai/dist:/usr/share/nginx/html:ro
    extra_hosts:
      # Cho phép nginx container gọi về host (API gateway, WS)
      - "host.docker.internal:host-gateway"
    depends_on:
      - api-gateway
    networks:
      - parksmart-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── Auth service – production overrides ────────────────────────────────────
  auth-service:
    environment:
      - DEBUG=False
      - ALLOWED_HOSTS=api.ghepdoicaulong.shop,localhost
      - CORS_ALLOWED_ORIGINS=https://ghepdoicaulong.shop

  # ─── Parking service ─────────────────────────────────────────────────────────
  parking-service:
    environment:
      - DEBUG=False
      - ALLOWED_HOSTS=api.ghepdoicaulong.shop,localhost
      - CORS_ALLOWED_ORIGINS=https://ghepdoicaulong.shop

  # ─── Booking service ─────────────────────────────────────────────────────────
