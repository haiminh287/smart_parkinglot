# Docker Compose override – Production local
# Dùng: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Override này:
#   1. Thêm nginx service → serve FE dist/ tại port 80
#   2. Set CORS_ALLOWED_ORIGINS + ALLOWED_HOSTS cho tất cả microservices
#      (FE nằm ở app.ghepdoicaulong.shop, API ở api.ghepdoicaulong.shop)
#   3. Tắt debug mode
#   4. Set đầy đủ production env vars cho gateway + auth-service

services:
  # ─── Nginx – serve FE static + reverse proxy ────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: parksmart_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ../infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../spotlove-ai/dist:/usr/share/nginx/html:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - gateway-service-go
    networks:
      - parksmart-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1/nginx-health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── Auth service – production overrides ────────────────────────────────────
  # auth-service cũng có production validation: ENV, SESSION_COOKIE_DOMAIN, CORS
  auth-service:
    environment:
      - ENV=production
      - DEBUG=False
      - ALLOWED_HOSTS=parksmart.ghepdoicaulong.shop,api.ghepdoicaulong.shop,localhost,auth-service,gateway-service-go
      - CORS_ALLOWED_ORIGINS=https://parksmart.ghepdoicaulong.shop,https://app.ghepdoicaulong.shop
      - SESSION_COOKIE_DOMAIN=.ghepdoicaulong.shop
      - SESSION_COOKIE_SECURE=true
      # OAuth credentials + redirect URI phải khớp với Google Console
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=https://parksmart.ghepdoicaulong.shop/api/auth/google/callback/

  # ─── Parking service ─────────────────────────────────────────────────────────
  parking-service:
    environment:
      - DEBUG=False
      - ALLOWED_HOSTS=api.ghepdoicaulong.shop,localhost,parking-service,gateway-service-go
      - CORS_ALLOWED_ORIGINS=https://app.ghepdoicaulong.shop,https://parksmart.ghepdoicaulong.shop

  # ─── Booking service ─────────────────────────────────────────────────────────
  booking-service:
    environment:
      - DEBUG=False
      - ALLOWED_HOSTS=api.ghepdoicaulong.shop,localhost,booking-service,gateway-service-go
      - CORS_ALLOWED_ORIGINS=https://app.ghepdoicaulong.shop,https://parksmart.ghepdoicaulong.shop

  # ─── Vehicle service ─────────────────────────────────────────────────────────
  vehicle-service:
    environment:
      - DEBUG=False
      - ALLOWED_HOSTS=api.ghepdoicaulong.shop,localhost,vehicle-service,gateway-service-go
      - CORS_ALLOWED_ORIGINS=https://app.ghepdoicaulong.shop,https://parksmart.ghepdoicaulong.shop

  # ─── Payment service ─────────────────────────────────────────────────────────
  payment-service-fastapi:
    environment:
      - DEBUG=False
      - ALLOWED_HOSTS=api.ghepdoicaulong.shop,localhost
      - CORS_ALLOWED_ORIGINS=https://app.ghepdoicaulong.shop,https://parksmart.ghepdoicaulong.shop

  # ─── Notification service ────────────────────────────────────────────────────
  notification-service-fastapi:
    environment:
      - DEBUG=False
      - ALLOWED_HOSTS=api.ghepdoicaulong.shop,localhost
      - CORS_ALLOWED_ORIGINS=https://app.ghepdoicaulong.shop,https://parksmart.ghepdoicaulong.shop

  # ─── Chatbot service ─────────────────────────────────────────────────────────
  chatbot-service-fastapi:
    environment:
      - DEBUG=False
      - ALLOWED_HOSTS=api.ghepdoicaulong.shop,localhost
      - CORS_ALLOWED_ORIGINS=https://app.ghepdoicaulong.shop,https://parksmart.ghepdoicaulong.shop

  # ─── API Gateway (full production config) ────────────────────────────────────
  # gateway-service-go có validation fail-fast cho ENV=production
  gateway-service-go:
    environment:
      - ENV=production
      - DEBUG=False
      - ALLOWED_HOSTS=api.ghepdoicaulong.shop,localhost
      # FE origins: app subdomain + parksmart subdomain
      - CORS_ALLOWED_ORIGINS=https://app.ghepdoicaulong.shop,https://parksmart.ghepdoicaulong.shop
      # Cookie: production hardening (cross-subdomain)
      - SESSION_COOKIE_DOMAIN=.ghepdoicaulong.shop
      - SESSION_COOKIE_SECURE=true
      - SESSION_COOKIE_SAMESITE=None
      # OAuth callback redirect về FE single-domain
      - FE_AUTH_CALLBACK_URL=https://parksmart.ghepdoicaulong.shop/auth/callback
