    environment:
      - DEBUG=False
      - ALLOWED_HOSTS=api.ghepdoicaulong.shop,localhost
      - CORS_ALLOWED_ORIGINS=https://ghepdoicaulong.shop

  # ─── Payment service ─────────────────────────────────────────────────────────
  payment-service-fastapi:
    environment:
      - DEBUG=False
      - ALLOWED_HOSTS=api.ghepdoicaulong.shop,localhost
      - CORS_ALLOWED_ORIGINS=https://ghepdoicaulong.shop

  # ─── Notification service ────────────────────────────────────────────────────
  notification-service-fastapi:
    environment:
      - DEBUG=False
