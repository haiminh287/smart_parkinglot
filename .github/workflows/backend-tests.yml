name: Backend Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend-microservices/ai-service-fastapi/**'
      - 'backend-microservices/gateway-service-go/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend-microservices/ai-service-fastapi/**'
      - 'backend-microservices/gateway-service-go/**'

jobs:
  ai-service-tests:
    name: AI Service Tests (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-microservices/ai-service-fastapi
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: backend-microservices/ai-service-fastapi/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx
      - name: Run tests
        env:
          GATEWAY_SECRET: ""
          TESTING: "true"
        run: pytest tests/ -v --tb=short -q

  gateway-tests:
    name: Gateway Tests (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-microservices/gateway-service-go
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend-microservices/gateway-service-go/go.mod
          cache-dependency-path: backend-microservices/gateway-service-go/go.sum
      - name: Run tests
        env:
          GATEWAY_SECRET: "test-secret-key-123"
        run: go test ./... -v -count=1
