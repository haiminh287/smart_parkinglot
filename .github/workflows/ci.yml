name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  backend-structure-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"
      - name: Verify backend repository layout
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path("backend-microservices")
          required_paths = [
              root,
              root / ".env.example",
              root / "gateway-service-go",
              root / "realtime-service-go",
              root / "chatbot-service-fastapi",
              root / "payment-service-fastapi",
          ]

          missing = [str(path) for path in required_paths if not path.exists()]
          if missing:
              raise SystemExit(f"Missing required backend paths: {missing}")

          print("backend-microservices layout check: OK")
          PY

  lint-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spotlove-ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "${{ env.NODE_VERSION }}"
          cache: npm
          cache-dependency-path: spotlove-ai/package-lock.json
      - run: npm ci
      - run: npm run lint

  test-frontend:
    runs-on: ubuntu-latest
    needs: lint-frontend
    defaults:
      run:
        working-directory: spotlove-ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "${{ env.NODE_VERSION }}"
          cache: npm
          cache-dependency-path: spotlove-ai/package-lock.json
      - run: npm ci
      - run: npm run test

  build-frontend:
    runs-on: ubuntu-latest
    needs: test-frontend
    defaults:
      run:
        working-directory: spotlove-ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "${{ env.NODE_VERSION }}"
          cache: npm
          cache-dependency-path: spotlove-ai/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          VITE_API_URL: https://api.example.com/api
          VITE_WS_URL: wss://api.example.com/ws
          VITE_GATEWAY_SECRET: ci-placeholder-gateway-secret
      - run: npm audit --audit-level=high
