---
name: 🐛 Báo lỗi (Bug Report)
description: Tạo báo cáo lỗi để giúp chúng tôi cải thiện
title: "[BUG] "
labels: ["bug", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Cảm ơn bạn đã báo cáo lỗi! Hãy điền đầy đủ thông tin bên dưới.

  - type: textarea
    id: description
    attributes:
      label: Mô tả lỗi
      description: Mô tả ngắn gọn lỗi bạn gặp phải
      placeholder: Khi tôi thực hiện [hành động], hệ thống [hành vi sai]...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Các bước tái tạo (Steps to Reproduce)
      description: Liệt kê các bước để tái tạo lỗi
      placeholder: |
        1. Truy cập '...'
        2. Nhấn vào '...'
        3. Cuộn xuống '...'
        4. Xem lỗi
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Hành vi mong đợi
      description: Hệ thống nên hoạt động như thế nào?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Hành vi thực tế
      description: Hệ thống đang hoạt động sai như thế nào?
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Mức độ nghiêm trọng
      options:
        - 🔴 Critical (Hệ thống không hoạt động)
        - 🟠 High (Chức năng chính bị ảnh hưởng)
        - 🟡 Medium (Chức năng phụ bị ảnh hưởng)
        - 🟢 Low (Vấn đề nhỏ, không ảnh hưởng sử dụng)
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Môi trường
      description: Thông tin về môi trường khi gặp lỗi
      placeholder: |
        - OS: Windows 11
        - Browser: Chrome 120
        - Node.js: v20.11
        - Version: v1.0.0
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Đính kèm error logs hoặc ảnh chụp màn hình
    validations:
      required: false
