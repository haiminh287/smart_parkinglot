# Nginx – Production config cho app.ghepdoicaulong.shop
# Serve FE static (spotlove-ai/dist/) + proxy API/WS về backend

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── Logging ───────────────────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # ─── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied    expired no-cache no-store private auth;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml
        application/rss+xml application/atom+xml image/svg+xml
        font/ttf font/woff font/woff2;

    # ─── Upstream (host.docker.internal = localhost từ trong container) ─────────
    upstream api_backend {
        server host.docker.internal:8000;
        keepalive 32;
    }

    upstream ws_backend {
        server host.docker.internal:8006;
        keepalive 32;
    }

    upstream ai_backend {
        server host.docker.internal:8009;
        keepalive 32;
    }

    server {
        listen       80;
        server_name  app.ghepdoicaulong.shop api.ghepdoicaulong.shop ws.ghepdoicaulong.shop parksmart.ghepdoicaulong.shop localhost;

        root  /usr/share/nginx/html;
        index index.html;

        # ─── Security headers ─────────────────────────────────────────────
        add_header X-Frame-Options          "SAMEORIGIN"                always;
        add_header X-Content-Type-Options   "nosniff"                   always;
        add_header X-XSS-Protection         "1; mode=block"             always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Content-Security-Policy – cho phép API và WS
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://api.ghepdoicaulong.shop wss://ws.ghepdoicaulong.shop https://parksmart.ghepdoicaulong.shop wss://parksmart.ghepdoicaulong.shop; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://lovable.dev; font-src 'self' data: https://fonts.gstatic.com https://fonts.googleapis.com;" always;

        # ─── Cache static assets ─────────────────────────────────────────────
        location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp|avif)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            access_log off;
        }

        # ─── Proxy /api/* → API Gateway ──────────────────────────────────────
        location /api/ {
            proxy_pass         http://api_backend/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # ─── Proxy /ws/* → Realtime service (WebSocket upgrade) ─────────────
        location /ws/ {
            proxy_pass         http://ws_backend/ws/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ─── Proxy /ai/* → AI Service (camera streams, plate scan, etc.) ──────
        location /ai/ {
            proxy_pass         http://ai_backend/ai/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout    300s;
            proxy_read_timeout    300s;
            proxy_buffering    off;
        }

        # ─── Guard backend-like paths khỏi rơi vào SPA fallback ─────────────
        # Nếu FE/ENV gọi nhầm /auth/*, /bookings/*... thì trả JSON 404 thay vì index.html
        location ~ ^/(auth|bookings|parking|vehicles|notifications|payments|chatbot|incidents)/ {
            default_type application/json;
            return 404 '{"error":"API path must use /api prefix"}';
        }

        # ─── SPA fallback – React router ─────────────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ─── Health check endpoint ────────────────────────────────────────────
        location /nginx-health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}
